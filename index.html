<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tamacoin Fishing Gold 5.7.0 - THE TRUE MONOLITH</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ==========================================================================
           [1] ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И СБРОС СТИЛЕЙ
           ========================================================================== */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
            user-select: none;
        }
        
        :root { 
            --gold: #ffd700; 
            --gold-dark: #b8860b;
            --bg: #0f172a; 
            --panel: rgba(30, 41, 59, 0.95); 
            --accent: #fbbf24;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Cascadia Code', 'Courier New', monospace;
            --shadow-gold: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        body { 
            font-family: var(--font-main); 
            background: var(--bg); 
            color: var(--text-main); 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            line-height: 1.4;
        }

        /* ==========================================================================
           [2] ДЕРЕВЯННАЯ ТАБЛИЧКА (WOOD ALERT)
           ========================================================================== */
        #wood-alert {
            display: none; 
            position: fixed; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%) scale(0.5);
            width: 300px; 
            height: 160px; 
            z-index: 9999;
            background: #5d4037; 
            border: 5px solid #3e2723; 
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.6);
            color: #eceff1; 
            text-align: center; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column;
            font-family: 'Courier New', Courier, monospace; 
            font-weight: 900;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            padding: 10px;
        }

        .wood-show { 
            display: flex !important; 
            animation: woodPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        @keyframes woodPop { 
            to { 
                transform: translate(-50%, -50%) scale(1); 
            } 
        }

        /* ==========================================================================
           [3] СТИЛИ ВЫПАДАЮЩЕГО САДКА
           ========================================================================== */
        .inventory-dropdown {
            margin: 0 0 15px 0; 
            background: var(--panel); 
            border-radius: 18px; 
            border: 2px solid rgba(255, 215, 0, 0.2); 
            overflow: hidden; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .inv-header {
            padding: 14px 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(255, 215, 0, 0.08); 
            cursor: pointer;
        }

        .inv-content { 
            max-height: 0; 
            padding: 0 18px; 
            transition: all 0.4s ease; 
            opacity: 0;
            background: rgba(0,0,0,0.15);
        }

        .inv-open .inv-content { 
            max-height: 400px; 
            padding: 18px; 
            opacity: 1; 
        }

        .inv-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px; 
            font-size: 14px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding-bottom: 4px; 
        }

        .inv-label { 
            color: var(--text-muted); 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 10px; 
        }

        .inv-val { 
            color: var(--gold); 
            font-family: var(--font-mono); 
            font-weight: 800; 
        }

        /* ==========================================================================
           [4] СТИЛИ ДЛЯ КОРОБКИ УДАЧИ
           ========================================================================== */
        .box-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 5000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .lucky-box-anim {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #d97706, #b45309);
            border: 6px solid #78350f;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.4);
        }

        .box-shake-effect { 
            animation: box-shake 0.5s infinite; 
        }

        @keyframes box-shake {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(8deg); }
            75% { transform: rotate(-8deg); }
        }

        .box-lid-anim {
            position: absolute;
            top: -15px; left: -10px;
            width: 170px; height: 45px;
            background: #f59e0b;
            border: 5px solid #78350f;
            border-radius: 10px;
            transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .box-open-state .box-lid-anim { 
            transform: translateY(-150px) rotate(-30deg); 
            opacity: 0; 
        }
        
        .prize-out {
            position: absolute;
            opacity: 0;
            font-weight: 900;
            color: var(--gold);
            font-size: 20px;
            text-align: center;
            width: 250px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
            transition: 1s ease-out;
            z-index: 10;
        }

        .box-open-state .prize-out { 
            opacity: 1; 
            transform: translateY(-100px) scale(1.4); 
        }

        /* ==========================================================================
           [5] ШАПКА, БЕГУЩАЯ СТРОКА И ТАЙМЕРЫ
           ========================================================================== */
        .header-fixed { 
            flex-shrink: 0; 
            z-index: 1000; 
            background: var(--bg); 
            border-bottom: 1px solid rgba(255,255,255,0.08); 
        }

        .marquee { 
            background: #020617; 
            height: 30px; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid var(--gold); 
            position: relative;
        }

        .marquee-content { 
            white-space: nowrap; 
            display: inline-block;
            animation: marquee-scroll 30s linear infinite; 
            font-size: 13px; 
            color: var(--gold); 
            padding-left: 100vw;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes marquee-scroll { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(-100%); } 
        }

        .timers-row { 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            padding: 10px 5px; 
            font-family: var(--font-mono); 
            font-size: 11px; 
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .timer-block { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }

        .timer-label { 
            color: var(--text-muted); 
            font-size: 10px; 
        }

        .timer-val { 
            color: var(--gold); 
            font-weight: 800; 
            min-width: 65px; 
        }

        /* [XP BAR STYLE - ПОЛНАЯ ВЕРСИЯ] */
        #xp-bar-container {
            padding: 0 16px;
            margin-top: 8px;
            margin-bottom: 4px;
        }
        .xp-text-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 900;
            color: var(--success);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .xp-track {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(16,185,129,0.3);
            overflow: hidden;
            position: relative;
        }
        .xp-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399, #10b981);
            background-size: 200% 100%;
            animation: xp-glow 3s linear infinite;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes xp-glow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* ==========================================================================
           [6] ПАНЕЛЬ СТАТИСТИКИ (BALANCE & GRID)
           ========================================================================== */
        .top-stats { 
            padding: 12px 16px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            flex-shrink: 0; 
        }

        .balance-pill { 
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 10px 28px; 
            border-radius: 35px; 
            border: 2px solid var(--gold);
            text-align: center; 
            min-width: 180px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5), var(--shadow-gold);
            position: relative;
            overflow: hidden;
        }

        .balance-value { 
            font-size: 24px; 
            font-weight: 900; 
            color: var(--gold); 
            letter-spacing: 1px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .status-info-grid { 
            display: grid; 
            grid-template-columns: 1fr 1.4fr 1fr; 
            gap: 12px; 
            width: 100%; 
            margin-top: 5px;
        }

        .status-card { 
            background: var(--panel); 
            padding: 12px 6px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.06);
            border-bottom: 4px solid rgba(0,0,0,0.3);
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .status-card span { 
            font-size: 9px; 
            color: var(--text-muted); 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 5px; 
            letter-spacing: 0.5px;
        }

        .status-card b { 
            font-size: 15px; 
            color: var(--text-main); 
            font-family: var(--font-mono); 
        }
        
        .status-card.jp-highlight { 
            border: 1px solid rgba(255, 215, 0, 0.4); 
            background: rgba(255, 215, 0, 0.08); 
            box-shadow: inset 0 0 15px rgba(255,215,0,0.1);
        }

        /* ==========================================================================
           [7] БЛОК ИГРОВОЙ АНИНИМАЦИИ
           ========================================================================== */
        .game-view-container { 
            padding: 0 16px; 
            flex-shrink: 0; 
            margin-bottom: 14px; 
        }

        .game-view {
            height: 200px; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative; 
            border-radius: 24px; 
            background: #000;
            border: 2px solid rgba(255,255,255,0.12); 
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,1);
        }

        .float-container { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .float-img { 
            max-width: 90%;
            max-height: 90%;
            width: auto;
            height: auto;
            object-fit: contain; 
            opacity: 0; 
            display: block;
            transition: opacity 0.5s ease;
            will-change: transform, opacity;
        }
        
        .anim-cast { 
            animation: cast-process 1.3s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards; 
        }
        
        @keyframes cast-process {
            0% { transform: scale(0.5) translateY(20px); opacity: 0; }
            25% { opacity: 1; transform: scale(1.1) translateY(0); }
            50% { transform: scale(1) rotate(5deg); }
            75% { transform: scale(1.05) rotate(-5deg); }
            100% { opacity: 0; transform: scale(1.2); }
        }

        #status-msg {
            color: var(--gold); 
            font-size: 11px; 
            position: absolute; 
            bottom: 14px; 
            font-weight: 900; 
            z-index: 50; 
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(15, 23, 42, 0.9); 
            padding: 6px 20px; 
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            backdrop-filter: blur(8px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* ==========================================================================
           [8] ТАБЫ И КНОПКИ
           ========================================================================== */
        .tabs-container { 
            flex-grow: 1; 
            width: 100%; 
            overflow-y: auto; 
            padding: 5px 16px; 
            position: relative;
            scrollbar-width: none;
        }
        .tab-content { display: none; width: 100%; padding-bottom: 30px; }
        .tab-active { display: block; animation: tabAppear 0.5s ease; }

        .action-container { 
            padding: 14px 16px 24px; 
            background: var(--bg); 
            flex-shrink: 0; 
            border-top: 1px solid rgba(255,255,255,0.12); 
            z-index: 100;
        }

        .btn-cast { 
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); 
            color: white; 
            border: none; 
            width: 100%; 
            height: 50px; 
            border-radius: 18px; 
            font-size: 20px; 
            font-weight: 900; 
            box-shadow: 0 5px 0 #92400e; 
            transition: all 0.1s ease; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .btn-cast:active { transform: translateY(3px); box-shadow: 0 2px 0 #92400e; }
        .btn-cast:disabled { background: #475569; box-shadow: 0 5px 0 #1e293b; opacity: 0.7; }

        /* ==========================================================================
           [9] НАВИГАЦИЯ
           ========================================================================== */
        .nav-bar { 
            height: 75px; 
            background: #020617; 
            border-top: 1px solid #334155; 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { font-size: 12px; text-align: center; color: #64748b; flex: 1; font-weight: 800; transition: 0.3s; display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--gold); transform: translateY(-2px); }
        .nav-item i { font-size: 24px; font-style: normal; }
        <div id="lucky-box-overlay" class="box-overlay">
        <div id="prize-text" class="prize-out">ВАШ ПРИЗ!</div>
        <div class="lucky-box-anim box-shake-effect" id="box-body" onclick="animateBoxOpening()">
            <div class="box-lid-anim"></div>
        </div>
        <p style="margin-top:25px; font-weight:900; color:var(--gold); letter-spacing:2px;" id="box-hint">ЖМИ НА КОРОБКУ!</p>
        <button id="close-box-btn" class="btn-cast" style="display:none; margin-top:30px; width:220px;" onclick="closeBoxModal()">ЗАБРАТЬ НАГРАДУ</button>
    </div>

    <div class="tabs-container">
        <div id="tab-main" class="tab-content tab-active">
            <div id="lake-status" style="text-align:center; font-weight:900; color:var(--accent); margin-bottom:20px; font-size:13px; text-transform:uppercase; letter-spacing:1px;">📍 ТЕКУЩАЯ ЛОКАЦИЯ: ОБЫЧНОЕ ОЗЕРО</div>
            <div style="background:rgba(255,255,255,0.02); padding:20px; border-radius:22px; border:1px solid rgba(255,255,255,0.06); box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
                <p style="font-size:13px; color:var(--text-muted); text-align:center; line-height:1.7;">Добро пожаловать в <b>Tamacoin Fishing</b>! <br><br> Нажимайте на кнопку «СДЕЛАТЬ ЗАБРОС», чтобы начать ловлю. Помните, что каждая попытка расходует энергию и прочность вашей удочки. Следите за «Золотым часом» для максимального улова!</p>
            </div>
        </div>

        <div id="tab-shop" class="tab-content">

            <div class="inventory-dropdown inv-open" id="inv-block">
                <div class="inv-header" onclick="toggleInv()">

                    <span id="inv-arrow" style="color:var(--gold); font-size:12px;">▲</span>
                </div>
                <div class="inv-content">
                    <div class="inv-row"><span class="inv-label">ВАШ УНИКАЛЬНЫЙ ID:</span><span class="inv-val" id="player-id">---</span></div>
                    <div class="inv-row"><span class="inv-label">ТЕКУЩИЙ СТАТУС:</span><span class="inv-val" id="player-status">ОБЫЧНЫЙ РЫБАК</span></div>

            <div id="leaderboard-list"></div>
        </div>

        <div id="tab-info" class="tab-content">
            <h3 style="text-align:center; color:var(--gold); margin-bottom:25px; text-transform:uppercase;">Информация и Рефералы</h3>
            <div class="shop-category" style="padding:20px; color:var(--text-muted); font-size:12px; line-height:1.6; background:rgba(255,255,255,0.02); border-radius:20px; border:1px solid rgba(255,255,255,0.05);">
                <p style="color:var(--gold); font-weight:900; margin-bottom:12px; text-transform: uppercase; letter-spacing:1px;">ВАЖНО ЗНАТЬ:</p>
                <p>• <b>Золотой час:</b> Первые 10 минут каждого часа. Шанс поймать трофей выше в разы!</p>
                <p>• <b>Озеро Надежды:</b> Глобальный лимит сервера — всего 10 Золотых Карпов в неделю.</p>
                <p>• <b>Коробка Удачи:</b> Приглашайте друзей! Как только ваш друг сделает 50 забросов, вы получите секретный кейс.</p>
                <p>• <b>VIP Статус:</b> Позволяет выводить средства от 10 000 TC вместо стандартных 30 000 TC.</p>
            </div>
            <div style="background:rgba(0,0,0,0.3); padding:25px; border-radius:24px; text-align:center; border:1px solid rgba(255,255,255,0.1); margin-top:20px;">
                <p style="font-size:11px; color:var(--text-muted); margin-bottom:15px; letter-spacing:1px; font-weight:700; text-transform: uppercase;">ПРИГЛАСИТЬ ДРУГА</p>
                <div id="ref-link" style="background:#000; padding:18px; font-size:11px; color:var(--gold); border:1px solid #334155; margin-bottom:25px; border-radius:15px; word-break:break-all; font-family:var(--font-mono); box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">...</div>
                <button class="btn-cast" style="height:55px; background:var(--gold); color:#000; font-weight:900;" onclick="copyRef()">СКОПИРОВАТЬ ССЫЛКУ</button>
            </div>
        </div>

        <div id="tab-admin" class="tab-content">
            <h3 style="text-align:center; color:var(--danger); margin-bottom:25px; text-transform:uppercase;">Панель Управления</h3>
            <div style="background:rgba(255,255,255,0.02); padding:20px; border-radius:20px; border:1px solid var(--danger);">
                <button class="btn-cast" style="background:var(--danger); box-shadow: 0 5px 0 #991b1b; height:50px; font-size:14px; margin-bottom:20px;" onclick="doAction('admin_get_all')">ЗАГРУЗИТЬ СПИСОК ВСЕХ ИГРОКОВ</button>
                <div id="admin-user-list" style="padding:15px; background:#000; border-radius:15px; color:var(--text-muted); font-size:10px; font-family:var(--font-mono); line-height:1.4; white-space: pre-wrap;">Данные не загружены...</div>
            </div>
        </div>
    </div>

    <div class="action-container" id="main-controls">
        <button id="bonus-btn" class="btn-cast" style="margin-bottom:15px; background:var(--success); box-shadow: 0 5px 0 #065f46; display:none;" onclick="doAction('get_daily')">🎁 ПОЛУЧИТЬ ЕЖЕДНЕВНЫЙ БОНУС</button>
        <button id="cast-btn" class="btn-cast" onclick="startFishing()">СДЕЛАТЬ ЗАБРОС УДОЧКИ</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('main', this)"><i>🎣</i><span>Ловля</span></div>
        <div class="nav-item" onclick="showTab('shop', this)"><i>🛒</i><span>Рынок</span></div>
        <div class="nav-item" onclick="showTab('top', this)"><i>🏆</i><span>Топ</span></div>
        <div id="nav-admin-btn" class="nav-item" style="display:none; color:var(--danger);" onclick="showTab('admin', this)"><i>⚙️</i><span>Админ</span></div>
        <div class="nav-item" onclick="showTab('info', this)"><i>ℹ️</i><span>Инфо</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const userId = tg.initDataUnsafe?.user?.id || '7883085758';
        const API = 'https://tama-bot-server.onrender.com/api/action';
        
        let lastBonusTime = 0;
        let userHasHope = false;
        let currentTab = 'main'; 
        let isFishingProcess = false; 
        let cachedData = null; 

        // [SMART CACHE RENDER ENGINE]
        function renderFromCache() {
            if(!cachedData) return;
            const d = cachedData;
            
            // Основной интерфейс
            if(d.b !== undefined) document.getElementById('main-balance').innerText = Math.floor(d.b).toLocaleString();
            if(d.jackpot) {
                const pj = Math.floor(d.jackpot.pool || 1000);
                document.getElementById('jackpot-display').innerText = pj.toLocaleString() + ' TC';
            }
            if(d.energy !== undefined) document.getElementById('energy').innerText = d.energy + '%';
            if(d.dur !== undefined) document.getElementById('dur').innerText = Math.floor(d.dur) + '%';
            if(d.fish !== undefined) document.getElementById('fish-weight').innerText = d.fish.toFixed(2) + ' кг';
            if(d.id) document.getElementById('player-id').innerText = d.id;

            // [НОВОЕ] XP & LEVEL SYSTEM
            const lvl = d.level || 1;
            const xp = d.xp || 0;
            const xpInLvl = xp % 100;
            document.getElementById('lvl-val').innerText = lvl;
            document.getElementById('xp-val').innerText = xpInLvl;
            document.getElementById('xp-fill').style.width = xpInLvl + '%';
            document.getElementById('player-lvl-info').innerText = lvl + ' УРОВЕНЬ';

            // [НОВОЕ] ADMIN ACCESS
            if(d.isAdmin) {
                document.getElementById('nav-admin-btn').style.display = 'flex';
            }

            // Статусы
            const isVip = (d.buffs?.vip > Date.now());
            document.getElementById('player-status').innerText = isVip ? '👑 VIP ИГРОК' : 'ОБЫЧНЫЙ РЫБАК';
            document.getElementById('player-status').style.color = isVip ? 'var(--gold)' : 'var(--text-muted)';
            
            userHasHope = (d.buffs?.hope > Date.now());
            document.getElementById('lake-status').innerText = userHasHope ? "📍 ТЕКУЩАЯ ЛОКАЦИЯ: ОЗЕРО НАДЕЖДЫ ✅" : "📍 ТЕКУЩАЯ ЛОКАЦИЯ: ОБЫЧНОЕ ОЗЕРО";
            
            document.getElementById('ref-link').innerText = `https://t.me/tamacoin_bot?start=${userId}`;
            
            lastBonusTime = d.lastBonus || 0;
            updateBonusButton();
        }

        // [TABS MANAGEMENT WITH CACHE]
        function showTab(name, el) {
            currentTab = name; 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('tab-active');
            el.classList.add('active');
            
            const isMain = (name === 'main');
            document.getElementById('top-area-wrapper').style.display = isMain ? 'block' : 'none';
            document.getElementById('main-controls').style.display = isMain ? 'block' : 'none';
            
            if(cachedData) renderFromCache();
            if(name === 'top') doAction('get_top');
            tg.HapticFeedback.selectionChanged();
        }

        // [CORE API ENGINE]
        async function doAction(action, payload = {}) {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const refBy = urlParams.get('start');
                
                const response = await fetch(API, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ 
                        userId, 
                        userName: tg.initDataUnsafe?.user?.first_name,
                        action, 
                        payload: { ...payload, lake: userHasHope ? 'hope' : 'normal', refBy } 
                    }) 
                });
                
                const data = await response.json(); 
                
                // [ВОССТАНОВЛЕНО]: Полная логика плашки продажи
                if (action === 'sell' && data.msg && data.msg.includes('Продано')) {
                    const profitMatch = data.msg.match(/\+(\d+)/);
                    showWoodAlert("РЫНОК", "ПРОДАНО!", profitMatch ? `+${profitMatch[1]} TC` : "УСПЕХ");
                }
                
                // Срывы и ошибки
                if (data.msg && (data.msg.includes('сорвалась') || data.msg.includes('Срыв'))) {
                    setTimeout(() => {
                        showWoodAlert("УПС!", "СОРВАЛАСЬ!", "РЫБА УШЛА...");
                    }, 1350);
                }
                
                updateUI(data);
            } catch(e) { console.error("Network fatal error:", e); }
        }

        function updateUI(d) {
            if(!d) return;
            // Умное слияние данных в кэш
            if(d.b !== undefined || d.energy !== undefined) {
                cachedData = {...cachedData, ...d}; 
            } else if(d.topPlayers) {
                cachedData = {...cachedData, topPlayers: d.topPlayers};
            } else if(d.allUsers) {
                document.getElementById('admin-user-list').innerText = JSON.stringify(d.allUsers, null, 2);
            }
            
            renderFromCache();

            // Отображение кейсов
            if (d.stats?.boxes > 0) {
                document.getElementById('open-box-btn').style.display = 'block';
                document.getElementById('open-box-btn').innerText = `🎁 ОТКРЫТЬ КЕЙС (${d.stats.boxes})`;
            }

            // Рендер улова
            if(d.catchData && currentTab === 'main') {
                const delay = isFishingProcess ? 1350 : 0;
                setTimeout(() => {
                    showWoodAlert("УЛОВ!", d.catchData.type, d.catchData.w);
                }, delay);
            }
            
            if(d.boxReward) {
                document.getElementById('prize-text').innerText = d.boxReward.n;
            }
            
            if(d.topPlayers) renderTop(d.topPlayers);
        }

        // [FISHING SYSTEM]
        function startFishing() {
            if (isFishingProcess) return; 
            isFishingProcess = true; 
            const btn = document.getElementById('cast-btn');
            const float = document.getElementById('float-img');
            
            btn.disabled = true;
            float.classList.add('anim-cast');
            float.style.opacity = '1';
            document.getElementById('status-msg').innerText = "ЗАКИДЫВАЕМ...";
            tg.HapticFeedback.impactOccurred('medium');

            setTimeout(() => { doAction('cast'); }, 100); 
        }

        function showWoodAlert(header, title, value) {
            document.getElementById('wood-header-type').innerText = header;
            document.getElementById('wood-title').innerText = title;
            document.getElementById('wood-profit').innerText = value;
            document.getElementById('wood-alert').classList.add('wood-show');
            tg.HapticFeedback.notificationOccurred('success');
        }

        function closeWood() {
            document.getElementById('wood-alert').classList.remove('wood-show');
            document.getElementById('cast-btn').disabled = false;
            const float = document.getElementById('float-img');
            float.classList.remove('anim-cast');
            float.style.opacity = '0';
            document.getElementById('status-msg').innerText = "ГОТОВ К ЛОВЛЕ";
            isFishingProcess = false; 
        }

        function renderTop(players) {
            const container = document.getElementById('leaderboard-list');
            container.innerHTML = players.map((p, i) => `
                <div class="leader-item ${p.id == userId ? 'me' : ''}">
                    <span class="rank">#${i+1}</span>
                    <span class="leader-name">${p.n || 'Рыбак'}</span>
                    <span class="leader-score">${Math.floor(p.b).toLocaleString()} TC</span>
                </div>
            `).join('');
        }

        function toggleInv() {
            const block = document.getElementById('inv-block');
            block.classList.toggle('inv-open');
            document.getElementById('inv-arrow').innerText = block.classList.contains('inv-open') ? '▲' : '▼';
            tg.HapticFeedback.selectionChanged();
        }

        function toggleCat(id) {
            document.getElementById(id).classList.toggle('open');
            tg.HapticFeedback.selectionChanged();
        }

        function showBoxModal() { 
            document.getElementById('lucky-box-overlay').style.display = 'flex'; 
            tg.HapticFeedback.impactOccurred('heavy'); 
        }
        
        function animateBoxOpening() {
            document.getElementById('lucky-box-overlay').classList.add('box-open-state');
            doAction('open_box').then(() => {
                setTimeout(() => {
                    document.getElementById('close-box-btn').style.display = 'block';
                }, 1000);
            });
        }
        
        function closeBoxModal() { location.reload(); }

        function requestPay(item, price) {
            document.getElementById('pay-price').innerText = price;
            document.getElementById('pay-memo').innerText = `FISH_${userId}_${item}`;
            document.getElementById('payment-area').style.display = 'block';
            tg.HapticFeedback.notificationOccurred('warning');
        }

        function copyRef() {
            const link = `https://t.me/tamacoin_bot?start=${userId}`;
            navigator.clipboard.writeText(link).then(() => {
                tg.showAlert("Реферальная ссылка скопирована в буфер!");
            });
        }

        function updateBonusButton() {
            const bonusDiff = (lastBonusTime + 86400000) - Date.now();
            const bBtn = document.getElementById('bonus-btn');
            const bTimer = document.getElementById('bonus-timer');
            if(bonusDiff > 0) {
                bTimer.innerText = new Date(bonusDiff).toISOString().substr(11, 8);
                bBtn.style.display = 'none';
            } else {
                bTimer.innerText = "ГОТОВ!";
                bBtn.style.display = 'block';
            }
        }

        setInterval(() => {
            updateBonusButton();
            const nextHour = (3600000 - (Date.now() % 3600000));
            document.getElementById('gold-timer').innerText = new Date(nextHour).toISOString().substr(11, 8);
        }, 1000);

        doAction('load');
    </script>
</body>
</html>
