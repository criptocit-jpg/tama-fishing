<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tamacoin Fishing Gold 5.7.0 - THE TRUE MONOLITH</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ==========================================================================
           [1] ГЛОБАЛЬНЫЙ СБРОС И ПЕРЕМЕННЫЕ (ROOT)
           ==========================================================================
        */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
            user-select: none;
            outline: none;
        }
        
        :root { 
            --gold: #ffd700; 
            --gold-dark: #b8860b;
            --bg: #0f172a; 
            --panel: rgba(30, 41, 59, 0.95); 
            --accent: #fbbf24;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Cascadia Code', 'Courier New', monospace;
            --shadow-gold: 0 0 15px rgba(255, 215, 0, 0.3);
            --transition-speed: 0.3s;
        }

        body { 
            font-family: var(--font-main); 
            background: var(--bg); 
            color: var(--text-main); 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
           [2] ДЕРЕВЯННОЕ ОКНО УВЕДОМЛЕНИЙ (WOOD ALERT)
           ==========================================================================
        */
        #wood-alert {
            display: none; 
            position: fixed; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%) scale(0.5);
            width: 320px; 
            height: 180px; 
            z-index: 9999;
            background: #5d4037; 
            border: 6px solid #3e2723; 
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.7);
            color: #eceff1; 
            text-align: center; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column;
            font-family: 'Courier New', Courier, monospace; 
            font-weight: 900;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            padding: 15px;
            pointer-events: all;
        }

        .wood-show { 
            display: flex !important; 
            animation: woodPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        @keyframes woodPop { 
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* ==========================================================================
           [3] СТИЛИ ИНВЕНТАРЯ (ВЫПАДАЮЩИЙ СПИСОК)
           ==========================================================================
        */
        .inventory-dropdown {
            margin: 0 0 20px 0; 
            background: var(--panel); 
            border-radius: 20px; 
            border: 2px solid rgba(255, 215, 0, 0.25); 
            overflow: hidden; 
            transition: all var(--transition-speed) ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .inv-header {
            padding: 16px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(255, 215, 0, 0.1); 
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .inv-content { 
            max-height: 0; 
            padding: 0 20px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0;
            background: rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .inv-open .inv-content { 
            max-height: 500px; 
            padding: 20px; 
            opacity: 1; 
        }

        .inv-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            font-size: 14px; 
            border-bottom: 1px solid rgba(255,255,255,0.06); 
            padding-bottom: 6px; 
        }

        .inv-label { 
            color: var(--text-muted); 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 11px; 
            letter-spacing: 0.5px;
        }

        .inv-val { 
            color: var(--gold); 
            font-family: var(--font-mono); 
            font-weight: 800; 
        }

        /* ==========================================================================
           [4] КОРОБКА УДАЧИ (LUCKY BOX MODAL)
           ==========================================================================
        */
        .box-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            z-index: 5000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .lucky-box-anim {
            width: 160px;
            height: 160px;
            background: linear-gradient(135deg, #d97706, #b45309);
            border: 7px solid #78350f;
            border-radius: 25px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.5);
        }

        .box-shake-effect { 
            animation: box-shake 0.6s infinite ease-in-out; 
        }

        @keyframes box-shake {
            0% { transform: rotate(0); }
            20% { transform: rotate(10deg); }
            40% { transform: rotate(-10deg); }
            60% { transform: rotate(10deg); }
            80% { transform: rotate(-10deg); }
            100% { transform: rotate(0); }
        }

        .box-lid-anim {
            position: absolute;
            top: -18px; left: -12px;
            width: 184px; height: 50px;
            background: #f59e0b;
            border: 6px solid #78350f;
            border-radius: 12px;
            transition: 0.7s cubic-bezier(0.68, -0.6, 0.3, 1.6);
            z-index: 5;
        }

        .box-open-state .box-lid-anim { 
            transform: translateY(-160px) rotate(-35deg); 
            opacity: 0; 
        }
        
        .prize-out {
            position: absolute;
            opacity: 0;
            font-weight: 900;
            color: var(--gold);
            font-size: 22px;
            text-align: center;
            width: 280px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255,215,0,0.9);
            transition: 1.2s ease-out;
            z-index: 10;
        }

        .box-open-state .prize-out { 
            opacity: 1; 
            transform: translateY(-120px) scale(1.5); 
        }

        /* ==========================================================================
           [5] HEADER: БЕГУЩАЯ СТРОКА И ТАЙМЕРЫ
           ==========================================================================
        */
        .header-fixed { 
            flex-shrink: 0; 
            z-index: 1000; 
            background: var(--bg); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .marquee { 
            background: #020617; 
            height: 32px; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            border-bottom: 1.5px solid var(--gold); 
            position: relative;
        }

        .marquee-content { 
            white-space: nowrap; 
            display: inline-block;
            animation: marquee-scroll 25s linear infinite; 
            font-size: 14px; 
            color: var(--gold); 
            padding-left: 100vw;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes marquee-scroll { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(-100%); } 
        }

        .timers-row { 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            padding: 12px 6px; 
            font-family: var(--font-mono); 
            font-size: 12px; 
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .timer-block { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }

        .timer-label { 
            color: var(--text-muted); 
            font-size: 11px; 
            font-weight: 600;
        }

        .timer-val { 
            color: var(--gold); 
            font-weight: 900; 
            min-width: 70px; 
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.2);
        }

        /* [XP BAR COMPONENT] */
        #xp-bar-container {
            padding: 0 16px;
            margin-top: 10px;
            margin-bottom: 6px;
        }
        .xp-text-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 900;
            color: var(--success);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .xp-track {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.06);
            border-radius: 15px;
            border: 1.5px solid rgba(16,185,129,0.35);
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .xp-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399, #10b981);
            background-size: 200% 100%;
            animation: xp-wave 4s linear infinite;
            transition: width 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes xp-wave {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* ==========================================================================
           [6] СТАТИСТИКА: БАЛАНС И КАРТОЧКИ
           ==========================================================================
        */
        .top-stats { 
            padding: 15px 16px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            flex-shrink: 0; 
        }

        .balance-pill { 
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 12px 30px; 
            border-radius: 40px; 
            border: 2.5px solid var(--gold);
            text-align: center; 
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), var(--shadow-gold);
            position: relative;
            overflow: hidden;
        }

        .balance-value { 
            font-size: 26px; 
            font-weight: 900; 
            color: var(--gold); 
            letter-spacing: 1.5px; 
            text-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }

        .status-info-grid { 
            display: grid; 
            grid-template-columns: 1fr 1.4fr 1fr; 
            gap: 12px; 
            width: 100%; 
            margin-top: 5px;
        }

        .status-card { 
            background: var(--panel); 
            padding: 14px 8px; 
            border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.08);
            border-bottom: 5px solid rgba(0,0,0,0.4);
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .status-card:active { transform: scale(0.96); }

        .status-card span { 
            font-size: 10px; 
            color: var(--text-muted); 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 6px; 
            letter-spacing: 0.6px;
        }

        .status-card b { 
            font-size: 16px; 
            color: var(--text-main); 
            font-family: var(--font-mono); 
        }
        
        .status-card.jp-highlight { 
            border: 1.5px solid rgba(255, 215, 0, 0.5); 
            background: rgba(255, 215, 0, 0.1); 
            box-shadow: inset 0 0 20px rgba(255,215,0,0.15);
        }

        /* ==========================================================================
           [7] ГЛАВНЫЙ ЭКРАН ИГРЫ (GAME VIEW)
           ==========================================================================
        */
        .game-view-container { 
            padding: 0 16px; 
            flex-shrink: 0; 
            margin-bottom: 15px; 
        }

        .game-view {
            height: 220px; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative; 
            border-radius: 28px; 
            background: #000;
            border: 2.5px solid rgba(255,255,255,0.15); 
            overflow: hidden;
            box-shadow: inset 0 0 60px rgba(0,0,0,1);
        }

        .float-container { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .float-img { 
            max-width: 85%;
            max-height: 85%;
            width: auto;
            height: auto;
            object-fit: contain; 
            opacity: 0; 
            display: block;
            transition: opacity 0.6s ease;
            will-change: transform, opacity;
        }
        
        .anim-cast { 
            animation: cast-main 1.4s cubic-bezier(0.5, 0, 0.5, 1) forwards; 
        }
        
        @keyframes cast-main {
            0% { transform: scale(0.4) translateY(40px); opacity: 0; }
            20% { opacity: 1; transform: scale(1.1) translateY(0); }
            40% { transform: scale(1) rotate(8deg); }
            60% { transform: scale(1.05) rotate(-8deg); }
            80% { transform: scale(1) rotate(4deg); }
            100% { opacity: 0; transform: scale(1.3); }
        }

        #status-msg {
            color: var(--gold); 
            font-size: 12px; 
            position: absolute; 
            bottom: 16px; 
            font-weight: 900; 
            z-index: 50; 
            text-transform: uppercase;
            letter-spacing: 2.5px;
            background: rgba(15, 23, 42, 0.92); 
            padding: 8px 24px; 
            border-radius: 40px;
            border: 1.5px solid rgba(255, 215, 0, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }

        /* ==========================================================================
           [8] ТАБЫ: ОСНОВНОЙ КОНТЕЙНЕР
           ==========================================================================
        */
        .tabs-container { 
            flex-grow: 1; 
            width: 100%; 
            overflow-y: auto; 
            padding: 5px 16px; 
            position: relative;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .tabs-container::-webkit-scrollbar { display: none; }
        
        .tab-content { display: none; width: 100%; padding-bottom: 40px; }
        .tab-active { display: block; animation: tabFadeIn 0.6s ease; }
        @keyframes tabFadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .shop-cat-content { display: none; padding: 12px 18px; }

        .item-row:last-child { border-bottom: none; }

        .btn-buy-ton:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--gold-dark); }

                    </div>
                    <div class="item-row">
                        <div class="item-info"><h4>Титановая удочка (7 дней)</h4><p>Защита от износа и обрывов. Настоящая мощь в ваших руках.</p></div>
                        <button class="btn-buy-ton" onclick="requestPay('titan_rod_7', 1.0)">1.0 TON</button>
                    </div>
                    <div class="item-row">
                        <div class="item-info"><h4>Озеро Надежды (7 дней)</h4><p>Доступ к секретной локации с элитными карпами и призами.</p></div>
                        <button class="btn-buy-ton" onclick="requestPay('hope_lake_7', 2.0)">2.0 TON</button>
                    </div>
                    <div class="item-row" style="border: 2px solid var(--gold); border-radius:18px; padding:12px; margin-top:10px; background: rgba(255,215,0,0.06);">
                        <div class="item-info"><h4>👑 КОРОЛЕВСКИЙ VIP СТАТУС</h4><p>Минимальный вывод 10к TC, безлимит энергии и корона в ТОПе (14д).</p></div>
                        <button class="btn-buy-ton" onclick="requestPay('vip_status_14', 3.0)">3.0 TON</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-top" class="tab-content">
            <h3 style="text-align:center; color:var(--gold); margin-bottom:25px; text-transform:uppercase; letter-spacing:2px;">Топ 10 Мастеров</h3>
            <div id="leaderboard-list">
                </div>
        </div>

        <div id="tab-info" class="tab-content">
            <h3 style="text-align:center; color:var(--gold); margin-bottom:25px; text-transform:uppercase;">Гайд и Рефералы</h3>
            <div class="shop-category" style="padding:22px; color:var(--text-muted); font-size:13px; line-height:1.7; background:rgba(255,255,255,0.03); border-radius:22px;">
                <p style="color:var(--gold); font-weight:900; margin-bottom:15px; text-transform: uppercase; letter-spacing:1px; border-bottom:1px solid rgba(255,215,0,0.2); padding-bottom:5px;">ПОДСКАЗКИ ДЛЯ ПРОФИ:</p>
                <p>✅ <b>Золотой час:</b> Первые 10 минут каждого нового часа. Лучшее время для рыбалки!</p>
                <p>✅ <b>Озеро Надежды:</b> Здесь водятся Золотые Карпы (всего 10 шт в неделю на всех).</p>
                <p>✅ <b>Рефералы:</b> За каждого приглашенного друга, сделавшего 50 забросов, вы получаете Кейс.</p>
                <p>✅ <b>Вывод средств:</b> Доступен в разделе профиля. VIP-игроки выводят быстрее.</p>
            </div>
            <div style="background:rgba(0,0,0,0.4); padding:30px; border-radius:28px; text-align:center; border:1px solid rgba(255,255,255,0.1); margin-top:25px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
                <p style="font-size:12px; color:var(--text-muted); margin-bottom:18px; letter-spacing:1.5px; font-weight:800; text-transform: uppercase;">ВАША ССЫЛКА ДЛЯ ПРИГЛАШЕНИЙ</p>
                <div id="ref-link" style="background:#000; padding:20px; font-size:11px; color:var(--gold); border:1px solid #334155; margin-bottom:25px; border-radius:18px; word-break:break-all; font-family:var(--font-mono); box-shadow: inset 0 0 15px rgba(0,0,0,0.8);">...</div>
                <button class="btn-cast" style="height:60px; background:var(--gold); color:#000; font-weight:900; letter-spacing:1px;" onclick="copyRef()">КОПИРОВАТЬ В БУФЕР</button>
            </div>
        </div>

        <div id="tab-admin" class="tab-content">
            <h3 style="text-align:center; color:var(--danger); margin-bottom:30px; text-transform:uppercase; letter-spacing:2px;">Core Administration</h3>
            <div style="background:rgba(0,0,0,0.3); padding:25px; border-radius:24px; border:2px solid var(--danger); box-shadow: 0 0 30px rgba(239, 68, 68, 0.1);">
                <button class="btn-cast" style="background:var(--danger); box-shadow: 0 6px 0 #991b1b; height:55px; font-size:14px; margin-bottom:25px; letter-spacing:1px;" onclick="doAction('admin_get_all')">ПОЛУЧИТЬ БАЗУ ДАННЫХ ПОЛЬЗОВАТЕЛЕЙ</button>
                <div id="admin-user-list" style="padding:20px; background:#000; border-radius:18px; color:#4ade80; font-size:11px; font-family:var(--font-mono); line-height:1.5; white-space: pre-wrap; border: 1px solid rgba(74, 222, 128, 0.2); overflow-y: auto; max-height:450px;">Ожидание запроса к серверу...</div>
            </div>
        </div>
    </div>

    <div class="action-container" id="main-controls">
        <button id="bonus-btn" class="btn-cast" style="margin-bottom:18px; background:var(--success); box-shadow: 0 6px 0 #065f46; display:none; height:55px;" onclick="doAction('get_daily')">🎁 ЗАБРАТЬ ЕЖЕДНЕВНЫЙ БОНУС</button>
        <button id="cast-btn" class="btn-cast" style="height:60px;" onclick="startFishing()">СДЕЛАТЬ ЗАБРОС УДОЧКИ</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('main', this)"><i>🎣</i><span>Ловля</span></div>
        <div class="nav-item" onclick="showTab('shop', this)"><i>🛒</i><span>Рынок</span></div>
        <div class="nav-item" onclick="showTab('top', this)"><i>🏆</i><span>Топ</span></div>
        <div id="nav-admin-btn" class="nav-item" style="display:none; color:var(--danger);" onclick="showTab('admin', this)"><i>⚙️</i><span>Админ</span></div>
        <div class="nav-item" onclick="showTab('info', this)"><i>ℹ️</i><span>Инфо</span></div>
    </div>

    <script>
        /* ==========================================================================
           [JS] TAMCOIN FISHING CORE LOGIC (V 5.7.0)
           ==========================================================================
        */
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const userId = tg.initDataUnsafe?.user?.id || '7883085758';
        const API = 'https://tama-bot-server.onrender.com/api/action';
        
        let lastBonusTime = 0;
        let userHasHope = false;
        let currentTab = 'main'; 
        let isFishingProcess = false; 
        let cachedData = null; 

        console.log("System initialized for user:", userId);

        /* [SMART CACHE RENDERER] - ОТВЕЧАЕТ ЗА ТО, ЧТОБЫ ДАННЫЕ НЕ ПРЫГАЛИ */
        function renderFromCache() {
            if(!cachedData) {
                console.warn("Render attempt with empty cache");
                return;
            }
            const d = cachedData;
            
            // 1. Баланс и Джекпот (с проверкой на наличие в объекте)
            if(d.b !== undefined) {
                document.getElementById('main-balance').innerText = Math.floor(d.b).toLocaleString();
            }
            if(d.jackpot) {
                const pj = Math.floor(d.jackpot.pool || 1000);
                document.getElementById('jackpot-display').innerText = pj.toLocaleString() + ' TC';
            }
            
            // 2. Энергия и Прочность
            if(d.energy !== undefined) document.getElementById('energy').innerText = d.energy + '%';
            if(d.dur !== undefined) document.getElementById('dur').innerText = Math.floor(d.dur) + '%';
            if(d.fish !== undefined) document.getElementById('fish-weight').innerText = d.fish.toFixed(2) + ' кг';
            if(d.id) document.getElementById('player-id').innerText = d.id;

            // 3. [XP SYSTEM] - РАСЧЕТ УРОВНЯ
            const lvl = d.level || 1;
            const xp = d.xp || 0;
            const xpInLvl = xp % 100;
            document.getElementById('lvl-val').innerText = lvl;
            document.getElementById('xp-val').innerText = xpInLvl;
            document.getElementById('xp-fill').style.width = xpInLvl + '%';
            document.getElementById('player-lvl-text').innerText = lvl + ' LVL';

            // 4. [ADMIN CHECK] - ПОКАЗ КНОПКИ
            if(d.isAdmin === true) {
                document.getElementById('nav-admin-btn').style.display = 'flex';
                console.log("Admin privileges confirmed");
            }

            // 5. Статусы (VIP и Баффы)
            const isVip = (d.buffs?.vip > Date.now());
            document.getElementById('player-status').innerText = isVip ? '👑 VIP АККАУНТ' : 'ОБЫЧНЫЙ РЫБАК';
            document.getElementById('player-status').style.color = isVip ? 'var(--gold)' : 'var(--text-muted)';
            
            userHasHope = (d.buffs?.hope > Date.now());
            document.getElementById('lake-status').innerText = userHasHope ? "📍 ТЕКУЩАЯ ЛОКАЦИЯ: ОЗЕРО НАДЕЖДЫ ✅" : "📍 ТЕКУЩАЯ ЛОКАЦИЯ: ОБЫЧНОЕ ОЗЕРО";
            
            document.getElementById('ref-link').innerText = `https://t.me/tamacoin_bot?start=${userId}`;
            
            lastBonusTime = d.lastBonus || 0;
            updateBonusButton();
            console.log("UI Refresh complete");
        }

        /* [TAB SWITCHER] - ПЕРЕКЛЮЧЕНИЕ МЕЖДУ ВКЛАДКАМИ */
        function showTab(name, el) {
            console.log("Switching tab to:", name);
            currentTab = name; 
            
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('tab-' + name).classList.add('tab-active');
            el.classList.add('active');
            
            // Скрываем/Показываем игровые блоки
            const isMain = (name === 'main');
            document.getElementById('top-area-wrapper').style.display = isMain ? 'block' : 'none';
            document.getElementById('main-controls').style.display = isMain ? 'block' : 'none';
            
            if(cachedData) renderFromCache();
            if(name === 'top') doAction('get_top');
            
            tg.HapticFeedback.selectionChanged();
        }

        /* [CORE API REQUEST] - ГЛАВНЫЙ СЕТЕВОЙ МОДУЛЬ */
        async function doAction(action, payload = {}) {
            console.log(`Executing API action: ${action}`, payload);
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const refBy = urlParams.get('start');
                
                const response = await fetch(API, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ 
                        userId, 
                        userName: tg.initDataUnsafe?.user?.first_name || 'Fisherman',
                        action, 
                        payload: { ...payload, lake: userHasHope ? 'hope' : 'normal', refBy } 
                    }) 
                });
                
                if(!response.ok) throw new Error("HTTP Status " + response.status);
                const data = await response.json(); 
                
                // [ВОССТАНОВЛЕНО]: Логика плашки продажи рыбы
                if (action === 'sell' && data.msg && data.msg.includes('Продано')) {
                    const profitMatch = data.msg.match(/\+(\d+)/);
                    const profitValue = profitMatch ? `+${profitMatch[1]} TC` : "УСПЕХ";
                    showWoodAlert("РЫНОК", "ПРОДАНО!", profitValue);
                }
                
                // Обработка срывов
                if (data.msg && (data.msg.includes('сорвалась') || data.msg.includes('Срыв'))) {
                    console.log("Fish lost animation triggered");
                    setTimeout(() => {
                        showWoodAlert("УПС!", "СОРВАЛАСЬ!", "РЫБА УШЛА...");
                    }, 1400);
                }
                
                updateUI(data);
            } catch(e) { 
                console.error("API Error encountered:", e);
                tg.showAlert("Ошибка связи с сервером. Проверьте интернет.");
            }
        }

        /* [UI UPDATE BRIDGE] - МОСТ МЕЖДУ API И ЭКРАНОМ */
        function updateUI(d) {
            if(!d) return;
            
            // Умное слияние данных в кэш без потери полей
            if(d.b !== undefined || d.energy !== undefined) {
                cachedData = {...cachedData, ...d}; 
            } else if(d.topPlayers) {
                cachedData = {...cachedData, topPlayers: d.topPlayers};
            } else if(d.allUsers) {
                document.getElementById('admin-user-list').innerText = JSON.stringify(d.allUsers, null, 2);
            }
            
            renderFromCache();

            // Проверка на наличие коробок (рефералы)
            if (d.stats?.boxes > 0) {
                document.getElementById('open-box-btn').style.display = 'block';
                document.getElementById('open-box-btn').innerText = `🎁 ОТКРЫТЬ КЕЙС (${d.stats.boxes})`;
            } else {
                document.getElementById('open-box-btn').style.display = 'none';
            }

            // Анимация улова
            if(d.catchData && currentTab === 'main') {
                const delayTime = isFishingProcess ? 1400 : 0;
                setTimeout(() => {
                    showWoodAlert("УЛОВ!", d.catchData.type, d.catchData.w);
                }, delayTime);
            }
            
            if(d.boxReward) {
                document.getElementById('prize-text').innerText = d.boxReward.n;
            }
            
            if(d.topPlayers) renderTop(d.topPlayers);
        }

        /* [FISHING LOGIC] - ЗАПУСК ПРОЦЕССА ЛОВЛИ */
        function startFishing() {
            if (isFishingProcess) return; 
            isFishingProcess = true; 
            
            const btn = document.getElementById('cast-btn');
            const float = document.getElementById('float-img');
            
            btn.disabled = true;
            float.classList.add('anim-cast');
            float.style.opacity = '1';
            document.getElementById('status-msg').innerText = "ЗАКИДЫВАЕМ...";
            
            tg.HapticFeedback.impactOccurred('medium');
            setTimeout(() => { doAction('cast'); }, 150); 
        }

        /* [ALERT MODALS] - ДЕРЕВЯННОЕ ОКНО */
        function showWoodAlert(header, title, value) {
            document.getElementById('wood-header-type').innerText = header;
            document.getElementById('wood-title').innerText = title;
            document.getElementById('wood-profit').innerText = value;
            document.getElementById('wood-alert').classList.add('wood-show');
            tg.HapticFeedback.notificationOccurred('success');
        }

        function closeWood() {
            document.getElementById('wood-alert').classList.remove('wood-show');
            document.getElementById('cast-btn').disabled = false;
            
            const float = document.getElementById('float-img');
            float.classList.remove('anim-cast');
            float.style.opacity = '0';
            
            document.getElementById('status-msg').innerText = "ГОТОВ К ЛОВЛЕ";
            isFishingProcess = false; 
        }

        /* [LEADERBOARD RENDERER] */
        function renderTop(players) {
            const container = document.getElementById('leaderboard-list');
            if(!players) return;
            
            container.innerHTML = players.map((p, i) => `
                <div class="leader-item ${p.id == userId ? 'me' : ''}">
                    <span class="rank">#${i+1}</span>
                    <span class="leader-name">${p.n || 'Анонимный Рыбак'}</span>
                    <span class="leader-score">${Math.floor(p.b).toLocaleString()} TC</span>
                </div>
            `).join('');
        }

        /* [UI HELPERS] */
        function toggleInv() {
            const block = document.getElementById('inv-block');
            block.classList.toggle('inv-open');
            document.getElementById('inv-arrow').innerText = block.classList.contains('inv-open') ? '▲' : '▼';
            tg.HapticFeedback.selectionChanged();
        }

        function toggleCat(id) {
            document.getElementById(id).classList.toggle('open');
            tg.HapticFeedback.selectionChanged();
        }

        function showBoxModal() { 
            document.getElementById('lucky-box-overlay').style.display = 'flex'; 
            tg.HapticFeedback.impactOccurred('heavy'); 
        }
        
        function animateBoxOpening() {
            document.getElementById('lucky-box-overlay').classList.add('box-open-state');
            doAction('open_box').then(() => {
                setTimeout(() => {
                    document.getElementById('close-box-btn').style.display = 'block';
                    document.getElementById('box-hint').style.display = 'none';
                }, 1100);
            });
        }
        
        function closeBoxModal() { location.reload(); }

        function requestPay(item, price) {
            document.getElementById('pay-price').innerText = price;
            document.getElementById('pay-memo').innerText = `FISH_${userId}_${item}`;
            document.getElementById('payment-area').style.display = 'block';
            tg.HapticFeedback.notificationOccurred('warning');
        }

        function copyRef() {
            const link = `https://t.me/tamacoin_bot?start=${userId}`;
            navigator.clipboard.writeText(link).then(() => {
                tg.showAlert("Реферальная ссылка скопирована! Отправьте её друзьям.");
            });
        }

        /* [TIME & TIMERS ENGINE] */
        function updateBonusButton() {
            const bonusDiff = (lastBonusTime + 86400000) - Date.now();
            const bBtn = document.getElementById('bonus-btn');
            const bTimer = document.getElementById('bonus-timer');
            
            if(bonusDiff > 0) {
                bTimer.innerText = new Date(bonusDiff).toISOString().substr(11, 8);
                bBtn.style.display = 'none';
            } else {
                bTimer.innerText = "ГОТОВ!";
                bBtn.style.display = 'block';
            }
        }

        setInterval(() => {
            updateBonusButton();
            const nextHour = (3600000 - (Date.now() % 3600000));
            document.getElementById('gold-timer').innerText = new Date(nextHour).toISOString().substr(11, 8);
        }, 1000);

        // Старт
        doAction('load');
    </script>
</body>
</html>
