<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tamacoin Fishing 5.9.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="wood-alert">
        <div id="wood-header-type">СООБЩЕНИЕ</div>
        <div id="wood-title">РЕЗУЛЬТАТ!</div>
        <div id="wood-profit">+0.00 TC</div>
        <button onclick="closeWood()" style="margin-top:10px; border:2px solid #fff; color:#fff; background:none; padding:5px 15px;">ПРИНЯТЬ</button>
    </div>

    <div class="header-fixed">
        <div class="marquee"><div class="marquee-content" id="events-line">Удачного клева в Tamacoin Fishing! 🎡 Испытай Удачу на Колесе Фортуны!</div></div>
        <div class="timers-row">
            <div>ЗОЛОТОЙ ЧАС: <span id="gold-timer" class="timer-val">00:00:00</span></div>
            <div>UNITS: <span id="units-val" class="timer-val">0</span></div>
        </div>
        <div style="padding: 10px 16px;">
            <div class="xp-track"><div id="xp-fill" class="xp-fill"></div></div>
        </div>
    </div>

    <div id="top-area-wrapper">
        <div style="display:flex; justify-content:center; padding: 15px 0;">
            <div class="balance-pill"><div class="balance-value" id="main-balance">0</div></div>
        </div>
        <div class="status-info-grid">
            <div class="status-card"><span>ЭНЕРГИЯ</span><br><b id="energy">100%</b></div>
            <div class="status-card"><span>JACKPOT</span><br><b id="jackpot-display">1000</b></div>
            <div class="status-card"><span>ПРОЧНОСТЬ</span><br><b id="dur">100%</b></div>
        </div>
        <div id="game-view-block" class="game-view">
            <img id="float-img" src="fish_anim.webp" class="float-img">
            <div id="status-msg" style="position:absolute; bottom:10px; color:var(--gold); font-weight:900;">ГОТОВ К ЛОВЛЕ</div>
        </div>
    </div>

    <div class="tabs-container">
        <div id="tab-main" class="tab-content tab-active">
            <p style="text-align:center; color:var(--accent); font-weight:900; margin-top:20px;">📍 ЛОКАЦИЯ: ОБЫЧНОЕ ОЗЕРО</p>
        </div>

        <div id="tab-fortune" class="tab-content">
            <div class="fortune-wheel-container">
                <div class="wheel-outer">
                    <div class="wheel-pointer"></div>
                    <canvas id="wheel-canvas" width="280" height="280"></canvas>
                </div>
                <button class="btn-cast" onclick="handleSpin('tc')">ИГРАТЬ (200 TC)</button>
                <button class="btn-cast" style="background:var(--gold); color:#000;" onclick="handleSpin('units')">КРУТИТЬ (2 UNITS)</button>
            </div>
        </div>
    </div>

    <div id="main-controls" style="padding: 15px 16px;">
        <button id="cast-btn" class="btn-cast" onclick="startFishing()">СДЕЛАТЬ ЗАБРОС</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('main', this)"><i>🎣</i><br>Ловля</div>
        <div class="nav-item" onclick="showTab('fortune', this)"><i>🎡</i><br>Удача</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
